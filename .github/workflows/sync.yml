name: "Aspiration Erimarkivoj"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Nettoyage avant aspiration
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Aspiration du site
        run: |
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --user-agent="Mozilla/5.0" \
               https://erimarkivoj.wordpress.com/ || true
          
      - name: Nettoyage et Validation Google
        run: |
          # 1. On insère ta balise de validation Google dans la page d'accueil
          find . -name "index.html" -exec sed -i '/<\/head>/i <meta name="google-site-verification" content="Brv4OkzwYgpD40vbEO3qlr3AaJtvjtyvygSRLJCx9s8" />' {} +

          # 2. On cache les zones indésirables (CSS)
          find . -name "*.html" -exec sed -i '/<\/head>/i <style>#wpadminbar, .marketing-bar, #eu-cookie-law, .wp-block-search, .wpcnt, #infinite-footer, .site-info, .jetpack-instant-search, .widget_search { display: none !important; } html { margin-top: 0 !important; } body { margin-bottom: 0 !important; }</style>' {} +
          
          # 3. On efface les textes spécifiques
          find . -name "*.html" -exec sed -i 's/Design a site like this with WordPress.com//g' {} +
          find . -name "*.html" -exec sed -i 's/Kiel komenci//g' {} +
          find . -name "*.html" -exec sed -i 's/Search powered by Jetpack//g' {} +
          find . -name "*.html" -exec sed -i 's/Serĉrezultoj//g' {} +

      - name: Injecter la recherche Google
        run: |
          # On insère le formulaire de recherche Google
          find . -name "*.html" -exec sed -i '/<body/a <div style="padding: 20px; max-width: 800px; margin: auto; text-align: center;"><form action="https://www.google.com/search" method="get" target="_blank"><input type="text" name="q" placeholder="Serĉi per Google..." style="padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 4px;"><input type="hidden" name="as_sitesearch" value="erimhub.github.io/revoluciuloj"><button type="submit" style="padding: 8px 15px; margin-left: 10px; cursor: pointer; background: #0073aa; color: white; border: none; border-radius: 4px;">Serĉi</button></form></div>' {} +

      - name: Envoi vers GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour : Validation Google + Recherche"
