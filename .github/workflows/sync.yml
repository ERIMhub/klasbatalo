name: "Aspiration Erimarkivoj"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Nettoyage
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Aspiration du site
        run: |
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --user-agent="Mozilla/5.0" \
               https://erimarkivoj.wordpress.com/ || true
          
      - name: Envoi vers GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour automatique"
