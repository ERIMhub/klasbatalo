name: "Aspiration Erimarkivoj"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Nettoyage avant aspiration
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Aspiration du site
        run: |
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --user-agent="Mozilla/5.0" \
               https://erimarkivoj.wordpress.com/ || true
          
      - name: Nettoyage du code HTML
        run: |
          # 1. On cache les zones indésirables (barre noire, pub WordPress, recherche cassée)
          find . -name "*.html" -exec sed -i '/<\/head>/i <style>#wpadminbar, .marketing-bar, #eu-cookie-law, .wp-block-search, .wpcnt, #infinite-footer, .site-info, .jetpack-instant-search, .widget_search { display: none !important; } html { margin-top: 0 !important; } body { margin-bottom: 0 !important; }</style>' {} +
          
          # 2. On efface les textes spécifiques que tu as mentionnés
          find . -name "*.html" -exec sed -i 's/Design a site like this with WordPress.com//g' {} +
          find . -name "*.html" -exec sed -i 's/Kiel komenci//g' {} +
          find . -name "*.html" -exec sed -i 's/Search powered by Jetpack//g' {} +
          find . -name "*.html" -exec sed -i 's/Serĉrezultoj//g' {} +

      - name: Générer l'index de recherche (Pagefind)
        run: |
          npx pagefind --site .

      - name: Injecter la barre de recherche dans les pages
        run: |
          find . -name "*.html" -exec sed -i '/<body/a <div id="search" style="padding: 20px; max-width: 800px; margin: auto;"></div><link href="/_pagefind/pagefind-ui.css" rel="stylesheet"><script src="/_pagefind/pagefind-ui.js"></script><script>window.addEventListener("DOMContentLoaded", (event) => { new PagefindUI({ element: "#search", showSubResults: true, translations: { placeholder: "Serĉi...", clear_search: "Viŝi", load_more: "Vidi pli da rezultoj", search_label: "Serĉi en la retejo", no_results: "Neniu rezulto trovita", no_query: "Neniu serĉpeto" } }); });</script>' {} +

      - name: Envoi vers GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mise à jour du site avec recherche Pagefind"
